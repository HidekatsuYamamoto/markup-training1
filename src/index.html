<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>山田花子のプロフィールページ</title>
    <meta
      name="description"
      content="マークアップトレーニング1を通してHTMLとCSSの基本を身につけましょう"
    />
    <link rel="stylesheet" href="css/reset.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div class="wrapper">
      <h1 class="name">山田 花子</h1>
      <div class="container">
        <div class="profile-img">
          <img src="img/profile_img.jpg" width="1520" height="864" alt="山田花子のプロフィール画像">
        </div>
  
        <section class="section-wrap">
         <h2 class="section-title">プロフィール</h2>
         <p>生年月日: 1998.2.26</p>
         <p>出身：アメリカ</p>
         <p>趣味：カメラ撮影 / 絵を描くこと</p>
         <p>好きな言葉：Freedom of choice for everyone.</p>
       </section>

        <section class="section-wrap">
         <h2 class="section-title">略歴</h2>
         <p>1998年02月：アメリカのニューヨーク州に産まれる</p>
         <p>2004年04月：ニューヨーク州の小学校に入学</p>
         <p>2008年12月：両親の仕事の関係で日本に移住</p>
         <p>2016年04月：写真の専門学校に入学</p>
         <p>2018年12月：Webデザインスクールに入学</p>
       </section>

        <section class="section-wrap">
         <h2 class="section-title">私の作品</h2>
         <p>東京のラーメン屋さん</p>
         <div class="profile-img">
          <img src="img/work01.jpg" width="1520" height="864" alt="東京のラーメン屋さん画像">
         </div>

        <p>埼玉の桜並木</p>
        <div class="profile-img">
          <img src="img/work02.jpg" width="1520" height="864" alt="埼玉の桜並木画像">
        </div>

        <p>富士山</p>
        <div class="profile-img">
          <img src="img/work03.jpg" width="1520" height="864" alt="富士山画像">
        </div>
       </section>
     </div>
     <footer class="footer">
      <small class="footer-copy">&copy; 2024 Hanako Yamada</small>
     </footer>
    </div>
  </body>
</html>
